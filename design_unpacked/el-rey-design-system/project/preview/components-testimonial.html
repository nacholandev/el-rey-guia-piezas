<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:22px 28px;font-family:var(--font-body)}
.tile{background:var(--bg-elevated);border:1px solid var(--line);border-radius:var(--radius-lg);padding:24px;display:flex;gap:18px;align-items:flex-start;box-shadow:var(--shadow-1)}
.avatar{width:56px;height:56px;border-radius:50%;background:var(--er-verde-pino-10);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;color:var(--er-verde-pino);font-size:20px;flex-shrink:0}
.quote{font-family:var(--font-display);font-weight:600;font-size:18px;line-height:1.35;letter-spacing:-0.01em;color:var(--fg-1);margin:0;text-wrap:pretty}
.attr{margin-top:10px;font-size:12px;color:var(--fg-3)}
.attr b{color:var(--fg-1);font-weight:600;font-family:var(--font-body)}
</style></head><body>
<div class="tile">
  <div class="avatar">M</div>
  <div>
    <p class="quote">"Lucas llegó tímido. Hoy explica sus jugadas a sus compañeros. El cambio es de fondo, no solo de tablero."</p>
    <div class="attr"><b>María C.</b> — madre de Lucas, 8 años</div>
  </div>
</div>
</body></html>
