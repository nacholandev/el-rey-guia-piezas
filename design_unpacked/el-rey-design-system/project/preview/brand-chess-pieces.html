<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:24px 28px}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.tile{aspect-ratio:1;background:var(--er-crema-soft);border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;border:1px solid var(--line)}
.tile img{width:60%;height:60%}
.lbl{font-family:var(--font-display);font-weight:700;font-size:11px;color:var(--fg-1);margin-top:8px;text-align:center}
</style></head><body>
<div class="row">
  <div class="tile"><img src="../assets/pieces/rey-verde.svg"/><div class="lbl">Rey</div></div>
  <div class="tile"><img src="../assets/pieces/reina-verde.svg"/><div class="lbl">Reina</div></div>
  <div class="tile"><img src="../assets/pieces/torre-verde.svg"/><div class="lbl">Torre</div></div>
  <div class="tile"><img src="../assets/pieces/alfil-verde.svg"/><div class="lbl">Alfil</div></div>
  <div class="tile"><img src="../assets/pieces/caballo-verde.svg"/><div class="lbl">Caballo</div></div>
  <div class="tile"><img src="../assets/pieces/peon-verde.svg"/><div class="lbl">Peón</div></div>
</div>
</body></html>
