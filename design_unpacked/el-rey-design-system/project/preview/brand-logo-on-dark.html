<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:24px 28px}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tile{border-radius:var(--radius-md);height:160px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
.tile img{height:64%;width:auto}
.label{margin-top:8px;font-family:var(--font-body);font-size:11px;color:var(--fg-3)}
</style></head><body>
<div class="row">
  <div><div class="tile" style="background:var(--er-azul-marino)"><img src="../assets/logos/logo-blanco.svg" alt=""/></div><div class="label">Blanco sobre azul marino</div></div>
  <div><div class="tile" style="background:var(--er-malva)"><img src="../assets/logos/logo-crema.svg" alt=""/></div><div class="label">Crema sobre malva</div></div>
  <div><div class="tile" style="background:var(--er-negro)"><img src="../assets/logos/logo-crema.svg" alt=""/></div><div class="label">Crema sobre negro</div></div>
</div>
</body></html>
