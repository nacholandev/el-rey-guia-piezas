<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:24px 28px}
.eyeb{font-family:var(--font-body);font-size:11px;font-weight:500;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--fg-3);margin-bottom:8px}
.spec{font-family:var(--font-display);font-weight:800;font-size:84px;line-height:0.95;letter-spacing:-0.02em;color:var(--er-verde-pino);margin:0}
.meta{margin-top:12px;display:flex;gap:18px;font-family:var(--font-body);font-size:12px;color:var(--fg-3)}
.meta b{color:var(--fg-1);font-weight:600;margin-right:4px;font-family:var(--font-body)}
</style></head><body>
<div class="eyeb">Tipografía primaria — Display</div>
<p class="spec">Nunito Aa</p>
<div class="meta"><span><b>Family</b>Nunito (self-hosted)</span><span><b>Weights</b>400–900 + italics</span><span><b>Tracking</b>−2%</span></div>
</body></html>
