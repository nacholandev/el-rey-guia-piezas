<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
<style>html,body{margin:0}body{background:var(--bg);padding:24px 28px}
.row{display:grid;grid-template-columns:repeat(8,1fr);gap:14px;text-align:center}
.tile{display:flex;flex-direction:column;align-items:center;gap:6px}
.icon{font-family:'Material Symbols Outlined';font-weight:400;font-size:28px;color:var(--fg-1);font-variation-settings:'opsz' 24}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head><body>
<div class="row">
  <div class="tile"><span class="icon">school</span><span class="lbl">school</span></div>
  <div class="tile"><span class="icon">psychology</span><span class="lbl">psychology</span></div>
  <div class="tile"><span class="icon">groups</span><span class="lbl">groups</span></div>
  <div class="tile"><span class="icon">handshake</span><span class="lbl">handshake</span></div>
  <div class="tile"><span class="icon">history_edu</span><span class="lbl">history_edu</span></div>
  <div class="tile"><span class="icon">calendar_month</span><span class="lbl">calendar_month</span></div>
  <div class="tile"><span class="icon">menu_book</span><span class="lbl">menu_book</span></div>
  <div class="tile"><span class="icon">trending_up</span><span class="lbl">trending_up</span></div>
  <div class="tile"><span class="icon">favorite</span><span class="lbl">favorite</span></div>
  <div class="tile"><span class="icon">lightbulb</span><span class="lbl">lightbulb</span></div>
  <div class="tile"><span class="icon">timer</span><span class="lbl">timer</span></div>
  <div class="tile"><span class="icon">chat_bubble</span><span class="lbl">chat</span></div>
  <div class="tile"><span class="icon">location_on</span><span class="lbl">location</span></div>
  <div class="tile"><span class="icon">arrow_forward</span><span class="lbl">arrow</span></div>
  <div class="tile"><span class="icon">check_circle</span><span class="lbl">check</span></div>
  <div class="tile"><span class="icon">star</span><span class="lbl">star</span></div>
</div>
</body></html>
