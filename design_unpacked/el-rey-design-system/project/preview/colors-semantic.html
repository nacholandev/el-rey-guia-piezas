<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:20px 24px;font-family:var(--font-body)}
  table{border-collapse:collapse;width:100%;font-size:13px}
  td,th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  th{font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--fg-3)}
  .dot{display:inline-block;width:18px;height:18px;border-radius:6px;vertical-align:middle;margin-right:10px;border:1px solid var(--line-strong)}
  code{font-family:var(--font-mono);font-size:12px;color:var(--fg-2)}
</style></head>
<body>
<table>
  <thead><tr><th>Token</th><th>Maps to</th><th>Usage</th></tr></thead>
  <tbody>
    <tr><td><span class="dot" style="background:var(--bg)"></span><code>--bg</code></td><td>Crema</td><td>Page background</td></tr>
    <tr><td><span class="dot" style="background:var(--bg-elevated)"></span><code>--bg-elevated</code></td><td>Blanco</td><td>Cards, modals</td></tr>
    <tr><td><span class="dot" style="background:var(--bg-inverse)"></span><code>--bg-inverse</code></td><td>Verde Pino</td><td>Hero / dark surfaces</td></tr>
    <tr><td><span class="dot" style="background:var(--fg-1)"></span><code>--fg-1</code></td><td>Verde Pino</td><td>Primary text on light</td></tr>
    <tr><td><span class="dot" style="background:var(--fg-2)"></span><code>--fg-2</code></td><td>Verde Pino 80</td><td>Secondary text</td></tr>
    <tr><td><span class="dot" style="background:var(--fg-3)"></span><code>--fg-3</code></td><td>Gris Frío</td><td>Tertiary / meta</td></tr>
    <tr><td><span class="dot" style="background:var(--fg-on-dark);border-color:var(--line-on-dark)"></span><code>--fg-on-dark</code></td><td>Crema</td><td>Text on Verde Pino — prefer over white</td></tr>
  </tbody>
</table>
</body></html>
