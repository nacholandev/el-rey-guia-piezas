<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:22px 28px}
.eyeb{font-family:var(--font-body);font-size:12px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-3)}
.quote{font-family:var(--font-display);font-weight:600;font-style:italic;font-size:26px;line-height:1.2;letter-spacing:-0.01em;color:var(--fg-1);margin:14px 0 0;max-width:560px;text-wrap:balance}
.attr{font-family:var(--font-body);font-size:12px;color:var(--fg-3);margin-top:14px}
</style></head><body>
<div class="eyeb">— Guía de marca</div>
<p class="quote">"El Rey es un lugar donde el fracaso no define, sino que enseña."</p>
<p class="attr">Eyebrow label + editorial pull-quote pairing</p>
</body></html>
