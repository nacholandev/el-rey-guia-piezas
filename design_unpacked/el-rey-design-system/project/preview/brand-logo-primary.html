<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:24px 28px}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.tile{border-radius:var(--radius-md);height:160px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
.tile img{height:64%;width:auto;display:block}
.label{margin-top:8px;font-family:var(--font-body);font-size:11px;color:var(--fg-3)}
</style></head><body>
<div class="row">
  <div>
    <div class="tile" style="background:var(--er-crema)"><img src="../assets/logos/logo-verde.svg" alt=""/></div>
    <div class="label">Verde sobre crema · principal institucional</div>
  </div>
  <div>
    <div class="tile" style="background:var(--er-verde-pino)"><img src="../assets/logos/logo-crema.svg" alt=""/></div>
    <div class="label">Crema sobre verde · editorial / premium</div>
  </div>
  <div>
    <div class="tile" style="background:var(--er-blanco)"><img src="../assets/logos/logo-verde.svg" alt=""/></div>
    <div class="label">Verde sobre blanco · web · digital</div>
  </div>
</div>
</body></html>
