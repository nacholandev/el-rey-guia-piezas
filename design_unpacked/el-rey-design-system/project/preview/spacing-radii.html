<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:22px 28px;font-family:var(--font-body)}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.tile{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:72px;height:72px;background:var(--er-verde-pino-10);border:1px solid var(--er-verde-pino-20)}
.tk{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
.nm{font-family:var(--font-body);font-size:12px;color:var(--fg-1);font-weight:600}
</style></head><body>
<div class="row">
  <div class="tile"><div class="box" style="border-radius:4px"></div><div class="nm">xs</div><div class="tk">4px</div></div>
  <div class="tile"><div class="box" style="border-radius:8px"></div><div class="nm">sm</div><div class="tk">8px</div></div>
  <div class="tile"><div class="box" style="border-radius:12px"></div><div class="nm">md</div><div class="tk">12px</div></div>
  <div class="tile"><div class="box" style="border-radius:20px"></div><div class="nm">lg</div><div class="tk">20px</div></div>
  <div class="tile"><div class="box" style="border-radius:28px"></div><div class="nm">xl</div><div class="tk">28px</div></div>
  <div class="tile"><div class="box" style="border-radius:999px"></div><div class="nm">pill</div><div class="tk">999px</div></div>
</div>
</body></html>
