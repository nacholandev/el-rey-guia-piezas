<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:22px 28px}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tile{background:var(--bg-elevated);border:1px solid var(--line);border-radius:var(--radius-md);padding:18px 18px 16px;display:flex;flex-direction:column;gap:10px}
.tile img{width:32px;height:32px}
.t{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--fg-1);line-height:1.2}
.d{font-family:var(--font-body);font-size:11px;color:var(--fg-2);line-height:1.4}
</style></head><body>
<div class="row">
  <div class="tile"><img src="../assets/values/cercania.svg"/><div class="t">Cercanía</div><div class="d">Acompañamos de cerca, sin distancia.</div></div>
  <div class="tile"><img src="../assets/values/pensamiento-estrategico.svg"/><div class="t">Pensamiento estratégico</div><div class="d">Pensar antes de mover.</div></div>
  <div class="tile"><img src="../assets/values/crecimiento.svg"/><div class="t">Crecimiento</div><div class="d">Cada partida es un paso.</div></div>
  <div class="tile"><img src="../assets/values/confianza.svg"/><div class="t">Confianza</div><div class="d">Construida en el error y el logro.</div></div>
  <div class="tile"><img src="../assets/values/formacion.svg"/><div class="t">Formación</div><div class="d">Estructura y método, sin rigidez.</div></div>
  <div class="tile"><img src="../assets/values/acompanamiento.svg"/><div class="t">Acompañamiento</div><div class="d">Caminamos a su ritmo.</div></div>
</div>
</body></html>
