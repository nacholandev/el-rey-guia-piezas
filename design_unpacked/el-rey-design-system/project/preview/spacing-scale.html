<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:22px 28px;font-family:var(--font-body)}
.row{display:flex;align-items:center;gap:14px;padding:6px 0}
.token{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:64px}
.bar{height:14px;background:var(--er-verde-pino);border-radius:2px}
.px{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-left:auto}
</style></head><body>
<div class="row"><span class="token">sp-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
<div class="row"><span class="token">sp-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
<div class="row"><span class="token">sp-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
<div class="row"><span class="token">sp-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
<div class="row"><span class="token">sp-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
<div class="row"><span class="token">sp-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
<div class="row"><span class="token">sp-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
<div class="row"><span class="token">sp-8</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
<div class="row"><span class="token">sp-9</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
</body></html>
