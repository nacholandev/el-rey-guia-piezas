<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:22px 28px;font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card{background:var(--bg-elevated);border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow-1)}
.card.dark{background:var(--er-verde-pino);border:0;color:var(--fg-on-dark)}
.eyeb{font-size:11px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-3)}
.dark .eyeb{color:var(--fg-on-dark-2)}
.h{font-family:var(--font-display);font-weight:700;font-size:20px;line-height:1.15;margin:8px 0 8px;letter-spacing:-0.01em}
.dark .h{color:var(--er-crema)}
.b{font-size:13px;line-height:1.5;color:var(--fg-2)}
.dark .b{color:var(--fg-on-dark-2)}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.tag{font-size:11px;color:var(--fg-3);font-weight:500}
.arr{font-size:18px;color:var(--fg-1)}
.dark .arr{color:var(--er-crema)}
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="eyeb">Programa</div>
    <div class="h">Iniciación · 6 a 8 años</div>
    <div class="b">Las primeras piezas, el primer movimiento, la primera decisión propia.</div>
    <div class="row"><span class="tag">Una clase semanal · 45 min</span><span class="arr">→</span></div>
  </div>
  <div class="card dark">
    <div class="eyeb">Metodología</div>
    <div class="h">Acompañamos cada paso.</div>
    <div class="b">Respetamos el ritmo y la forma de cada niño, tanto en el logro como en el error.</div>
    <div class="row"><span class="tag" style="color:var(--fg-on-dark-2)">Conocer al equipo</span><span class="arr">→</span></div>
  </div>
</div>
</body></html>
