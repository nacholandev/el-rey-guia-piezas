<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:20px 24px;font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--line);background:var(--bg-elevated)}
  .chip{height:96px;display:flex;align-items:flex-end;padding:12px}
  .meta{padding:10px 12px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .name{font-weight:600;color:var(--fg-1);font-size:13px}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:0.02em}
  .on-dark{color:var(--fg-on-dark)}
</style></head>
<body>
<div class="row">
  <div class="sw">
    <div class="chip" style="background:var(--er-malva)"><span class="er-micro on-dark">Editorial</span></div>
    <div class="meta"><span class="name">Malva</span><span class="hex">#6B4966</span></div>
  </div>
  <div class="sw">
    <div class="chip" style="background:var(--er-azul-marino)"><span class="er-micro on-dark">Premium</span></div>
    <div class="meta"><span class="name">Azul Marino</span><span class="hex">#1B2A4A</span></div>
  </div>
  <div class="sw">
    <div class="chip" style="background:var(--er-gris-frio)"><span class="er-micro on-dark">Low hierarchy</span></div>
    <div class="meta"><span class="name">Gris Frío</span><span class="hex">#8C8F94</span></div>
  </div>
</div>
</body></html>
