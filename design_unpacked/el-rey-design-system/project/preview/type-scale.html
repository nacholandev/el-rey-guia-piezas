<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:22px 28px}
.row{display:grid;grid-template-columns:80px 1fr 80px;align-items:baseline;gap:14px;padding:8px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:0}
.token{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
.sample{font-family:var(--font-display);font-weight:700;color:var(--fg-1);line-height:1.05;letter-spacing:-0.01em}
.size{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-align:right}
.body-sample{font-family:var(--font-body);font-weight:400;color:var(--fg-1);line-height:1.4}
</style></head><body>
<div class="row"><span class="token">display</span><span class="sample" style="font-size:42px;font-weight:800">Mentes estratégicas</span><span class="size">88 / 1.02</span></div>
<div class="row"><span class="token">h1</span><span class="sample" style="font-size:30px">Acompañamos</span><span class="size">56 / 1.12</span></div>
<div class="row"><span class="token">h2</span><span class="sample" style="font-size:22px">Pensar bien</span><span class="size">40 / 1.12</span></div>
<div class="row"><span class="token">h3</span><span class="sample" style="font-size:18px">Confianza</span><span class="size">24 / 1.25</span></div>
<div class="row"><span class="token">lead</span><span class="body-sample" style="font-size:16px;color:var(--fg-2)">Formamos mentes que piensan por sí mismas.</span><span class="size">20 / 1.45</span></div>
<div class="row"><span class="token">body</span><span class="body-sample" style="font-size:14px">Aquí no se trata de memorizar jugadas.</span><span class="size">16 / 1.55</span></div>
<div class="row"><span class="token">small</span><span class="body-sample" style="font-size:12px;color:var(--fg-2)">Acompañamiento personalizado</span><span class="size">14 / 1.5</span></div>
</body></html>
