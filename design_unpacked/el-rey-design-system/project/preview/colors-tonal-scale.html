<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0}
  body{background:var(--bg);padding:20px 24px;font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .step{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--line);background:var(--bg-elevated)}
  .swatch{height:80px}
  .label{padding:8px 10px}
  .name{font-weight:600;color:var(--fg-1);font-size:12px}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);display:block;margin-top:2px}
  .title{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--fg-1);margin:0 0 10px}
</style></head>
<body>
<h3 class="title">Verde Pino — tonal scale</h3>
<div class="row">
  <div class="step"><div class="swatch" style="background:var(--er-verde-pino-10)"></div><div class="label"><div class="name">10</div><span class="hex">#ECF0EE</span></div></div>
  <div class="step"><div class="swatch" style="background:var(--er-verde-pino-20)"></div><div class="label"><div class="name">20</div><span class="hex">#D8E0DD</span></div></div>
  <div class="step"><div class="swatch" style="background:var(--er-verde-pino-60)"></div><div class="label"><div class="name">60</div><span class="hex">#88A39C</span></div></div>
  <div class="step"><div class="swatch" style="background:var(--er-verde-pino-80)"></div><div class="label"><div class="name">80</div><span class="hex">#466860</span></div></div>
  <div class="step"><div class="swatch" style="background:var(--er-verde-pino)"></div><div class="label"><div class="name">100</div><span class="hex">#1C3D34</span></div></div>
</div>
</body></html>
