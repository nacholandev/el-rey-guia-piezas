<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>html,body{margin:0}body{background:var(--bg);padding:24px 28px}
.row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.tile{border-radius:var(--radius-sm);aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
.tile img{width:60%;height:60%}
.lbl{font-family:var(--font-body);font-size:10px;color:var(--fg-3);text-align:center;margin-top:6px;text-transform:uppercase;letter-spacing:0.08em}
</style></head><body>
<div class="row">
  <div><div class="tile" style="background:var(--er-crema)"><img src="../assets/logos/isotipo-verde.svg"/></div><div class="lbl">Verde</div></div>
  <div><div class="tile" style="background:var(--er-verde-pino)"><img src="../assets/logos/isotipo-blanco.svg"/></div><div class="lbl">Blanco</div></div>
  <div><div class="tile" style="background:var(--er-verde-pino)"><img src="../assets/logos/isotipo-crema.svg"/></div><div class="lbl">Crema</div></div>
  <div><div class="tile" style="background:var(--er-crema)"><img src="../assets/logos/isotipo-malva.svg"/></div><div class="lbl">Malva</div></div>
  <div><div class="tile" style="background:var(--er-crema)"><img src="../assets/logos/isotipo-azul.svg"/></div><div class="lbl">Azul</div></div>
  <div><div class="tile" style="background:var(--er-crema)"><img src="../assets/logos/isotipo-gris.svg"/></div><div class="lbl">Gris</div></div>
  <div><div class="tile" style="background:var(--er-crema)"><img src="../assets/logos/isotipo-negro.svg"/></div><div class="lbl">Negro</div></div>
</div>
</body></html>
